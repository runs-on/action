name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create, for example v2.1.2
        required: true
        type: string
      target_branch:
        description: Branch to build and release from
        required: false
        default: v2
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, tag, and publish
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag }}
      TARGET_BRANCH: ${{ inputs.target_branch || 'v2' }}
      UPX_VERSION: 5.0.2
    steps:
      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$TAG" =~ ^v[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must look like vX.Y, vX.Y.Z, or a prerelease variant."
            exit 1
          fi

          if [[ "$TARGET_BRANCH" =~ [[:space:]] ]]; then
            echo "::error::target_branch must not contain whitespace."
            exit 1
          fi

          if [[ "$TARGET_BRANCH" == refs/* || "$TARGET_BRANCH" == -* || "$TARGET_BRANCH" == /* ]]; then
            echo "::error::target_branch must be a branch name, not a full ref or option-like value."
            exit 1
          fi

          if ! git check-ref-format --branch "$TARGET_BRANCH" >/dev/null 2>&1; then
            echo "::error::target_branch is not a valid branch name."
            exit 1
          fi

          if git ls-remote --exit-code --tags "https://github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists."
            exit 1
          fi

      - name: Checkout target branch
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Configure git identity
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install UPX
        shell: bash
        run: |
          set -euo pipefail
          upx_archive="upx-${UPX_VERSION}-amd64_linux.tar.xz"
          curl -fsSL \
            -o "${RUNNER_TEMP}/${upx_archive}" \
            "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/${upx_archive}"
          tar -xJf "${RUNNER_TEMP}/${upx_archive}" -C "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/upx-${UPX_VERSION}-amd64_linux" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/upx-${UPX_VERSION}-amd64_linux/upx" --version

      - name: Test
        run: go test ./...

      - name: Build distributed artifacts
        run: make build

      - name: Commit distributed artifacts
        shell: bash
        run: |
          set -euo pipefail

          git add main-linux-amd64 main-linux-arm64 main-windows-amd64.exe index.js post.js

          if git diff --cached --quiet; then
            echo "Distributed artifacts are already up to date; tagging current HEAD."
          else
            git commit -m "dist: rebuild binaries for ${TAG}"
            git push origin "HEAD:${TARGET_BRANCH}"
          fi

      - name: Create and push release tag
        shell: bash
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists."
            exit 1
          fi

          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          shasum -a 256 main-linux-amd64 main-linux-arm64 main-windows-amd64.exe > SHA256SUMS

      - name: Sign checksums
        shell: bash
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
          RELEASE_GPG_KEY_ID: ${{ secrets.RELEASE_GPG_KEY_ID }}
        run: |
          set -euo pipefail

          if [[ -z "${RELEASE_GPG_PRIVATE_KEY}" ]]; then
            echo "::error::RELEASE_GPG_PRIVATE_KEY secret is required."
            exit 1
          fi

          if [[ -z "${RELEASE_GPG_PASSPHRASE}" ]]; then
            echo "::error::RELEASE_GPG_PASSPHRASE secret is required."
            exit 1
          fi

          export GNUPGHOME="${RUNNER_TEMP}/gnupg"
          mkdir -p "${GNUPGHOME}"
          chmod 700 "${GNUPGHOME}"

          printf '%s' "${RELEASE_GPG_PRIVATE_KEY}" | gpg --batch --import

          gpg_args=()
          if [[ -n "${RELEASE_GPG_KEY_ID:-}" ]]; then
            gpg_args+=(--local-user "${RELEASE_GPG_KEY_ID}")
          fi

          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${RELEASE_GPG_PASSPHRASE}" \
            "${gpg_args[@]}" \
            --armor --detach-sign \
            --output SHA256SUMS.asc SHA256SUMS

      - name: Create draft GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --draft \
            --generate-notes \
            main-linux-amd64 \
            main-linux-arm64 \
            main-windows-amd64.exe \
            SHA256SUMS \
            SHA256SUMS.asc

      - name: Attest release binaries (SLSA Build Provenance)
        uses: actions/attest-build-provenance@v4.1.0
        with:
          # Each entry in SHA256SUMS becomes a separate attested subject,
          # so consumers can verify a single binary with
          #   gh attestation verify main-linux-amd64 --owner runs-on
          # without having to download the full sums file first.
          subject-checksums: SHA256SUMS

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release edit "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false
