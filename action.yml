name: 'runs-on/action'
description: 'RunsOn Action for magic caching, and more'
runs:
  using: 'node24'
  main: 'index.js'
  post: 'post.js'

inputs:
  show_env:
    description: 'Show all environment variables'
    required: false
    default: 'false'
  show_costs:
    description: 'Control how execution costs are displayed: "inline" for log output, "summary" for GitHub job summary, any other value disables the feature'
    required: false
    default: 'inline'
  metrics:
    description: 'Comma separated list of additional metrics to send to CloudWatch (cpu, network, memory, disk, io)'
    required: false
    default: ''
  network_interface:
    description: 'Network interface to monitor'
    required: false
    default: 'enp39s0'
  disk_device:
    description: 'Disk device to monitor'
    required: false
    default: 'nvme0n1p1'
  sccache:
    description: 'Enable sccache. Can take either "s3" (RunsOn S3 cache bucket) or be empty (disabled). You still need to setup sccache in your workflow, for instance with mozilla-actions/sccache-action.'
    required: false
    default: ''
  datadog_api_key:
    description: 'Datadog API key. When set together with datadog_app_key, per-job cost data is forwarded to Datadog as custom metrics in the post step.'
    required: false
    default: ''
  datadog_app_key:
    description: 'Datadog application key. Required alongside datadog_api_key to forward cost metrics to Datadog.'
    required: false
    default: ''
  datadog_site:
    description: 'Datadog site (e.g. datadoghq.com, datadoghq.eu, us3.datadoghq.com). Defaults to datadoghq.com.'
    required: false
    default: 'datadoghq.com'